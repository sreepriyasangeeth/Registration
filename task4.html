<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .page1 {
            min-height: 100vh;
            font-family: sans-serif;
            background-color: rosybrown;
        }

        .left {
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 12px;
            text-align: center;
        }

        .left p {
            font-size: 16px;
            color: grey;
            margin-bottom: 25px;
            text-align: center;
        }

        .icons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .icons i {
            font-size: 24px;
            cursor: pointer;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        form input {
            width: 100%;
            padding: 16px 24px;
            background-color: rgba(248, 248, 255, 0.995);
            border: 3px solid rgba(248, 248, 255, 0.995);
            border-radius: 30px;
            font-size: 15px;
            color: grey;
            margin-bottom: 20px;
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            background-color: aquamarine;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        .right {
            background-color: aquamarine;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
        }

        .right h2 {
            font-size: 45px;
            margin-bottom: 20px;
        }

        .right p {
            font-size: 16px;
            margin-bottom: 40px;
        }

        .btn-signup {
            padding: 14px 60px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 16px;
        }

        .or_line {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .or_line hr {
            width: 47%;
        }
    </style>
</head>

<body>

    <div class="container-fluid ">
        <div class="row vh-100">

            <div class="col-12 col-lg-7 left">
                <h1>Login to Your Account</h1>
                <p>Login using social networks</p>

                <div class="icons">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-google-plus"></i>
                    <i class="fa-brands fa-linkedin"></i>
                </div>

                <div class="or_line">
                    <hr>
                    <h4>OR</h4>
                    <hr>
                </div>

                <div class="form-container">
                    <form>
                        <input type="text" placeholder="Email">
                        <input type="password" placeholder="Password">
                        <button type="submit" class="btn-signin">Sign In</button>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-5 right">
                <h2>New Here?</h2>
                <p>Sign up and discover a great <br> amount of new opportunities!</p>
                <form>
                    <button type="submit" class="btn-signup">Sign Up</button>
                </form>
            </div>

        </div>
    </div>

</body>

</html>
